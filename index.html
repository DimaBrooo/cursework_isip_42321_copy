<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Монополия АТСТ - Ultimate Edition</title>
    <style>
        :root {
            --board-bg: #cde6d0;
            --center-bg: #fafafa;
            --p1-color: #e74c3c;
            --p2-color: #3498db;
            --p3-color: #f1c40f;
            --p4-color: #9b59b6;
            --card-chance: #f39c12;
            --card-tax: #c0392b;
            --house-color: #27ae60;
            --hotel-color: #c0392b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            width: 100%;
            height: 95vh;
        }

        /* Board Styles */
        #board {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            grid-template-rows: repeat(11, 1fr);
            gap: 2px;
            background-color: #34495e;
            border: 5px solid #ecf0f1;
            border-radius: 8px;
            flex-grow: 1;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cell {
            background-color: var(--board-bg);
            border: 1px solid #bdc3c7;
            display: flex;
            flex-direction: column;
            font-size: 10px;
            text-align: center;
            position: relative;
            transition: background-color 0.3s;
        }

        .cell-header {
            height: 20%;
            width: 100%;
            border-bottom: 1px solid rgba(0,0,0,0.2);
        }
        
        /* Orientation fixes for sides */
        .cell.left .cell-header, .cell.right .cell-header {
            height: 100%;
            width: 20%;
            border-bottom: none;
            border-right: 1px solid rgba(0,0,0,0.2);
            float: left;
        }
        .cell.right .cell-header {
            border-right: none;
            border-left: 1px solid rgba(0,0,0,0.2);
            float: right;
        }

        .cell-name {
            padding: 2px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            flex-grow: 1;
        }

        .cell-price {
            padding-bottom: 2px;
            font-size: 9px;
        }

        .center-square {
            grid-column: 2 / 11;
            grid-row: 2 / 11;
            background-color: var(--center-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Players */
        .player-token {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* Houses & Hotels */
        .building-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            display: flex;
            gap: 2px;
        }
        .house-dot {
            width: 8px;
            height: 8px;
            background-color: var(--house-color);
            border-radius: 50%;
            border: 1px solid white;
        }
        .hotel-dot {
            width: 10px;
            height: 10px;
            background-color: var(--hotel-color);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            border: 1px solid white;
        }

        /* Sidebar */
        #sidebar {
            width: 300px;
            background-color: #ecf0f1;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .panel {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h2, h3 { margin-top: 0; color: #2c3e50; }

        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 5px;
            font-weight: bold;
            transition: transform 0.1s, background-color 0.2s;
        }
        .btn:hover { background-color: #2980b9; }
        .btn:active { transform: scale(0.98); }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-success { background-color: #27ae60; }
        .btn-success:hover { background-color: #219150; }
        .btn-warning { background-color: #f39c12; }
        .btn-warning:hover { background-color: #d35400; }

        .log-entry {
            font-size: 12px;
            border-bottom: 1px solid #eee;
            padding: 4px 0;
        }
        .log-entry:last-child { border-bottom: none; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(3px);
        }
        .modal {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            max-width: 90%;
            text-align: center;
            animation: popIn 0.3s ease-out;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .card-display {
            padding: 20px;
            border-radius: 8px;
            margin: 15px 0;
            color: white;
            font-weight: bold;
            font-size: 1.2em;
            border: 2px dashed rgba(255,255,255,0.5);
        }
        .card-chance { background-color: var(--card-chance); }
        .card-tax { background-color: var(--card-tax); }

        /* Responsive */
        @media (max-width: 900px) {
            #game-container { flex-direction: column; height: auto; overflow-y: auto; }
            #board { width: 100%; aspect-ratio: 1; }
            #sidebar { width: 100%; }
            .cell { font-size: 8px; }
            .player-token { width: 15px; height: 15px; }
        }

        /* Animations */
        @keyframes tokenMove {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        @keyframes cardFlip {
            0% { transform: rotateY(0); opacity: 0; }
            50% { transform: rotateY(90deg); opacity: 0.5; }
            100% { transform: rotateY(180deg); opacity: 1; }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(243, 156, 18, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(243, 156, 18, 0); }
            100% { box-shadow: 0 0 0 0 rgba(243, 156, 18, 0); }
        }

        .token-moving {
            animation: tokenMove 0.3s ease-in-out;
        }

        .card-flip {
            animation: cardFlip 0.6s ease-in-out;
            transform-style: preserve-3d;
        }

        .pulse-effect {
            animation: pulse 1s infinite;
        }

        /* House/Hotel indicators */
        .house-indicator {
            background-color: var(--house-color);
            width: 8px;
            height: 8px;
            border-radius: 2px;
            display: inline-block;
            margin: 1px;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .hotel-indicator {
            background-color: var(--hotel-color);
            width: 10px;
            height: 10px;
            border-radius: 2px;
            display: inline-block;
            margin: 1px;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* Trade modal */
        .trade-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 1000;
            max-width: 400px;
            width: 90%;
        }

        .trade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }

        /* Auction styles */
        .auction-panel {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .save-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .save-notification.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="board">
        <!-- Cells generated by JS -->
        <div class="center-square">
            <h1>МОНОПОЛИЯ АТСТ</h1>
            <div id="dice-area" style="font-size: 40px; margin: 20px;">🎲 <span id="dice-val">-</span></div>
            <div id="turn-indicator" style="font-weight: bold; margin-bottom: 10px;">Ход: Игрок 1</div>
            <button class="btn btn-success" id="roll-btn" onclick="game.rollDice()">Бросить кубики</button>
            <div style="margin-top: 20px; font-size: 12px; color: #7f8c8d;">
                Автосохранение включено
            </div>
            <button class="btn btn-warning" style="margin-top:10px;" onclick="game.saveGame()">Сохранить сейчас</button>
            <button class="btn btn-danger" style="margin-top:5px;" onclick="game.resetGame()">Новая игра</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="panel">
            <h3>Статус игроков</h3>
            <div id="players-stats"></div>
        </div>
        <div class="panel">
            <h3>Действия</h3>
            <button class="btn" id="buy-btn" onclick="game.buyProperty()" disabled>Купить участок</button>
            <button class="btn btn-warning" id="auction-btn" onclick="game.startAuction()" disabled>Аукцион</button>
            <button class="btn" id="trade-btn" onclick="game.openTradeModal()" disabled>Торговля</button>
            <button class="btn" id="build-btn" onclick="game.openBuildModal()" disabled>Построить дом/отель</button>
            <button class="btn btn-danger" id="end-turn-btn" onclick="game.endTurn()" disabled>Завершить ход</button>
        </div>
        <div class="panel" style="flex-grow: 1; display: flex; flex-direction: column;">
            <h3>Журнал событий</h3>
            <div id="game-log" style="overflow-y: auto; flex-grow: 1; font-family: monospace;"></div>
        </div>
    </div>
</div>

<!-- Modals -->
<div id="modal-overlay" class="modal-overlay">
    <div class="modal" id="modal-content">
        <!-- Dynamic Content -->
    </div>
</div>

<script>
/**
 * AUDIO SYSTEM (Synthesized sounds)
 */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const playSound = (type) => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;
    
    if (type === 'roll') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
    } else if (type === 'buy') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.setValueAtTime(600, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
    } else if (type === 'error') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.linearRampToValueAtTime(100, now + 0.2);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
    } else if (type === 'win') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.setValueAtTime(500, now + 0.1);
        osc.frequency.setValueAtTime(600, now + 0.2);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.6);
        osc.start(now);
        osc.stop(now + 0.6);
    }
};

/**
 * GAME DATA & CONFIG
 */
const BOARD_SIZE = 40;
const COLORS = {
    BROWN: '#8d6e63', LIGHTBLUE: '#81d4fa', PINK: '#f48fb1', ORANGE: '#ffcc80',
    RED: '#ef9a9a', YELLOW: '#fff59d', GREEN: '#a5d6a7', BLUE: '#90caf9'
};

// Simplified board data for demo (Full 40 would be longer, using a pattern)
const rawBoardData = [
    { name: "СТАРТ", type: "corner", price: 0 },
    { name: "Набережная", type: "property", group: "BROWN", price: 60, rent: 2 },
    { name: "Шанс", type: "chance" },
    { name: "Бульвар", type: "property", group: "BROWN", price: 60, rent: 4 },
    { name: "Налог", type: "tax", amount: 200 },
    { name: "Вокзал АТСТ", type: "railroad", price: 200, rent: 25 },
    { name: "Проспект", type: "property", group: "LIGHTBLUE", price: 100, rent: 6 },
    { name: "Шанс", type: "chance" },
    { name: "Улица Мира", type: "property", group: "LIGHTBLUE", price: 100, rent: 6 },
    { name: "Площадь", type: "property", group: "LIGHTBLUE", price: 120, rent: 8 },
    { name: "ТЮРЬМА", type: "corner" },
    { name: "Электричество", type: "utility", price: 150 },
    { name: "Ленина", type: "property", group: "PINK", price: 140, rent: 10 },
    { name: "Шанс", type: "chance" },
    { name: "Кирова", type: "property", group: "PINK", price: 140, rent: 10 },
    { name: "Гагарина", type: "property", group: "PINK", price: 160, rent: 12 },
    { name: "Парковка", type: "corner" },
    { name: "Мира", type: "property", group: "ORANGE", price: 180, rent: 14 },
    { name: "Шанс", type: "chance" },
    { name: "Советская", type: "property", group: "ORANGE", price: 180, rent: 14 },
    { name: "Карла Маркса", type: "property", group: "ORANGE", price: 200, rent: 16 },
    { name: "Полиция", type: "corner" }, // Just going to jail logic
    { name: "Коммунальная", type: "utility", price: 150 },
    { name: "Шанс", type: "chance" },
    { name: "Пушкина", type: "property", group: "RED", price: 220, rent: 18 },
    { name: "Лермонтова", type: "property", group: "RED", price: 220, rent: 18 },
    { name: "Вокзал Центр", type: "railroad", price: 200, rent: 25 },
    { name: "Чехова", type: "property", group: "RED", price: 240, rent: 20 },
    { name: "Иди в тюрьму", type: "gotojail" },
    { name: "Гоголя", type: "property", group: "YELLOW", price: 260, rent: 22 },
    { name: "Некрасова", type: "property", group: "YELLOW", price: 260, rent: 22 },
    { name: "Шанс", type: "chance" },
    { name: "Тургенева", type: "property", group: "YELLOW", price: 280, rent: 24 },
    { name: "Вокзал Восток", type: "railroad", price: 200, rent: 25 },
    { name: "Шанс", type: "chance" },
    { name: "Толстого", type: "property", group: "GREEN", price: 300, rent: 26 },
    { name: "Достоевского", type: "property", group: "GREEN", price: 300, rent: 26 },
    { name: "Налог", type: "tax", amount: 100 },
    { name: "Чкалова", type: "property", group: "GREEN", price: 320, rent: 28 },
    { name: "ФИНИШ", type: "corner" }
];

class MonopolyGame {
    constructor() {
        this.players = [
            { id: 0, name: "Игрок 1", color: "var(--p1-color)", money: 1500, pos: 0, jailed: false, props: [] },
            { id: 1, name: "Игрок 2", color: "var(--p2-color)", money: 1500, pos: 0, jailed: false, props: [] },
            { id: 2, name: "Игрок 3", color: "var(--p3-color)", money: 1500, pos: 0, jailed: false, props: [] },
            { id: 3, name: "Игрок 4", color: "var(--p4-color)", money: 1500, pos: 0, jailed: false, props: [] }
        ];
        this.currentPlayerIdx = 0;
        this.boardState = JSON.parse(JSON.stringify(rawBoardData)); // Deep copy
        this.log("Добро пожаловать в Монополию АТСТ!");
        this.initBoard();
        this.renderPlayers();
        this.loadGame();
        this.updateUI();
    }

    initBoard() {
        const boardEl = document.getElementById('board');
        // Clear existing cells except center
        Array.from(boardEl.children).forEach(c => {
            if (!c.classList.contains('center-square')) boardEl.removeChild(c);
        });

        // Grid positioning logic for 11x11 grid (0-39)
        // Bottom: 10, 1..9 | Left: 10..2, 0 | Top: 0, 1..9 | Right: 2..10, 10
        
        this.boardState.forEach((cell, index) => {
            const el = document.createElement('div');
            el.className = 'cell';
            el.id = `cell-${index}`;
            
            // Positioning
            if (index >= 0 && index <= 10) { // Bottom row
                el.style.gridRow = 11;
                el.style.gridColumn = 11 - index;
                if(index === 0) el.classList.add('corner-big');
            } else if (index >= 11 && index <= 20) { // Left col
                el.style.gridRow = 11 - (index - 10);
                el.style.gridColumn = 1;
                el.classList.add('left');
            } else if (index >= 21 && index <= 30) { // Top row
                el.style.gridRow = 1;
                el.style.gridColumn = index - 20 + 1;
            } else if (index >= 31 && index <= 39) { // Right col
                el.style.gridRow = index - 30 + 1;
                el.style.gridColumn = 11;
                el.classList.add('right');
            }

            // Content
            let headerColor = '';
            if (cell.group) headerColor = COLORS[cell.group] || '#ccc';
            
            let html = '';
            if (cell.type === 'property' || cell.type === 'railroad' || cell.type === 'utility') {
                if (headerColor) {
                    html += `<div class="cell-header" style="background-color: ${headerColor}"></div>`;
                }
                html += `<div class="cell-name">${cell.name}</div>`;
                if (cell.price) html += `<div class="cell-price">${cell.price}$</div>`;
                html += `<div class="building-indicator" id="builds-${index}"></div>`;
            } else {
                html += `<div class="cell-name" style="height:100%">${cell.name}</div>`;
            }
            el.innerHTML = html;
            boardEl.appendChild(el);
        });

        // Create player tokens
        this.players.forEach(p => {
            const token = document.createElement('div');
            token.className = 'player-token';
            token.id = `token-${p.id}`;
            token.style.backgroundColor = p.color;
            boardEl.appendChild(token);
            this.moveTokenVisual(p.id, 0);
        });
    }

    moveTokenVisual(playerId, posIndex) {
        const cell = document.getElementById(`cell-${posIndex}`);
        const token = document.getElementById(`token-${playerId}`);
        const rect = cell.getBoundingClientRect();
        const boardRect = document.getElementById('board').getBoundingClientRect();
        
        // Offset for multiple players on same cell
        const offset = playerId * 5; 
        
        token.style.left = (rect.left - boardRect.left + 5 + offset) + 'px';
        token.style.top = (rect.top - boardRect.top + 5 + offset) + 'px';
    }

    rollDice() {
        const rollBtn = document.getElementById('roll-btn');
        rollBtn.disabled = true;
        
        playSound('roll');
        let rolls = 0;
        const interval = setInterval(() => {
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-val').innerText = `${d1} + ${d2}`;
            rolls++;
            if (rolls > 10) {
                clearInterval(interval);
                const total = d1 + d2;
                this.handleMove(total);
            }
        }, 50);
    }

    handleMove(steps) {
        const player = this.players[this.currentPlayerIdx];
        
        if (player.jailed) {
            if (steps % 2 !== 0) { // Simple jail logic: odd roll gets out
                player.jailed = false;
                this.log(`${player.name} выходит из тюрьмы!`);
            } else {
                this.log(`${player.name} остается в тюрьме.`);
                this.endTurn();
                return;
            }
        }

        let newPos = player.pos + steps;
        if (newPos >= 40) {
            newPos -= 40;
            player.money += 200;
            this.log(`${player.name} прошел круг! Получено 200$.`);
            playSound('win');
        }
        
        player.pos = newPos;
        this.moveTokenVisual(player.id, newPos);
        this.handleCellAction(newPos);
    }

    handleCellAction(pos) {
        const cell = this.boardState[pos];
        const player = this.players[this.currentPlayerIdx];
        
        this.log(`${player.name} попал на: ${cell.name}`);

        if (cell.type === 'gotojail') {
            player.pos = 10; // Jail index
            player.jailed = true;
            this.moveTokenVisual(player.id, 10);
            this.log(`${player.name} отправлен в тюрьму!`);
            playSound('error');
            this.endTurn();
            return;
        }

        if (cell.type === 'tax') {
            player.money -= cell.amount;
            this.log(`Оплачен налог: ${cell.amount}$`);
            playSound('error');
        }

        if (cell.type === 'chance') {
            this.triggerChance(player);
        }

        if (['property', 'railroad', 'utility'].includes(cell.type)) {
            if (!cell.owner) {
                if (player.money >= cell.price) {
                    document.getElementById('buy-btn').disabled = false;
                    document.getElementById('auction-btn').disabled = false;
                } else {
                    this.log("Недостаточно средств для покупки.");
                    document.getElementById('auction-btn').disabled = false; // Can still auction? Maybe not if no money, but simplified here
                }
            } else if (cell.owner !== player.id) {
                this.payRent(player, cell);
            } else {
                // Own property
                document.getElementById('build-btn').disabled = false;
            }
        }

        this.checkBankruptcy(player);
        this.updateUI();
        
        // Enable end turn if no forced actions, but usually we wait for user to click buy or end
        if (cell.owner === undefined || cell.owner === player.id || cell.type === 'tax' || cell.type === 'chance') {
             if(!document.getElementById('buy-btn').disabled || !document.getElementById('build-btn').disabled) {
                 // Wait for user action
             } else {
                 document.getElementById('end-turn-btn').disabled = false;
             }
        } else {
             document.getElementById('end-turn-btn').disabled = false;
        }
    }

    triggerChance(player) {
        const cards = [
            { text: "Банковская ошибка в вашу пользу! +100$", effect: (p) => p.money += 100 },
            { text: "Штраф за превышение скорости -50$", effect: (p) => p.money -= 50 },
            { text: "Вы выиграли в лотерею! +50$", effect: (p) => p.money += 50 },
            { text: "Оплата ремонта дорог -40$", effect: (p) => p.money -= 40 }
        ];
        const card = cards[Math.floor(Math.random() * cards.length)];
        
        const modal = document.getElementById('modal-content');
        modal.innerHTML = `
            <h2>ШАНС</h2>
            <div class="card-display card-chance">${card.text}</div>
            <button class="btn" onclick="game.closeModalAndContinue()">OK</button>
        `;
        document.getElementById('modal-overlay').style.display = 'flex';
        
        // Store temp effect
        this.tempEffect = card.effect;
    }

    closeModalAndContinue() {
        document.getElementById('modal-overlay').style.display = 'none';
        if (this.tempEffect) {
            this.tempEffect(this.players[this.currentPlayerIdx]);
            this.log(`Карта шанса исполнена.`);
            this.tempEffect = null;
            this.updateUI();
        }
        document.getElementById('end-turn-btn').disabled = false;
    }

    payRent(player, cell) {
        const owner = this.players[cell.owner];
        let rent = cell.rent || 0;
        
        // Multiplier for houses/hotels (simplified)
        if (cell.houses) rent *= (cell.houses === 5 ? 4 : cell.houses + 1); 
        if (cell.type === 'railroad') {
            const count = this.boardState.filter(c => c.type === 'railroad' && c.owner === owner.id).length;
            rent = 25 * Math.pow(2, count - 1);
        }

        if (player.money >= rent) {
            player.money -= rent;
            owner.money += rent;
            this.log(`${player.name} заплатил ${rent}$ аренды ${owner.name}.`);
            playSound('buy'); // Reuse sound
        } else {
            this.log(`${player.name} не может заплатить аренду! Банкротство.`);
            this.handleBankruptcy(player, owner);
        }
    }

    buyProperty() {
        const player = this.players[this.currentPlayerIdx];
        const cell = this.boardState[player.pos];
        
        if (player.money >= cell.price) {
            player.money -= cell.price;
            cell.owner = player.id;
            player.props.push(player.pos);
            this.log(`${player.name} купил ${cell.name} за ${cell.price}$.`);
            playSound('buy');
            
            // Visual update
            const cellEl = document.getElementById(`cell-${player.pos}`);
            cellEl.style.border = `3px solid ${player.color}`;
            
            document.getElementById('buy-btn').disabled = true;
            document.getElementById('auction-btn').disabled = true;
            document.getElementById('end-turn-btn').disabled = false;
            this.updateUI();
            this.saveGame();
        }
    }

    startAuction() {
        const cell = this.boardState[this.players[this.currentPlayerIdx].pos];
        this.log(`Запущен аукцион на ${cell.name}. Стартовая цена: ${Math.floor(cell.price/2)}$`);
        alert("Функция аукциона в разработке для этой демо-версии. Участок остается свободным.");
        document.getElementById('end-turn-btn').disabled = false;
    }

    openTradeModal() {
        // Simplified trade logic
        const modal = document.getElementById('modal-content');
        let options = '';
        this.players.forEach((p, idx) => {
            if (idx !== this.currentPlayerIdx) {
                options += `<button class="btn" style="background:${p.color}" onclick="game.proposeTrade(${idx})">Торговать с ${p.name}</button>`;
            }
        });
        modal.innerHTML = `<h2>Торговля</h2>${options}<button class="btn btn-danger" onclick="game.closeModal()">Отмена</button>`;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    proposeTrade(targetId) {
        const target = this.players[targetId];
        const amount = prompt(`Сколько вы хотите предложить ${target.name}?`, "100");
        if (amount && !isNaN(amount)) {
            // Simple AI accept logic
            if (confirm(`${target.name} соглашается на сделку! Отдать ${amount}$?`)) {
                this.players[this.currentPlayerIdx].money -= parseInt(amount);
                target.money += parseInt(amount);
                this.log(`Сделка совершена: ${this.players[this.currentPlayerIdx].name} отдал ${amount}$ ${target.name}.`);
                this.closeModal();
                this.updateUI();
            }
        }
    }

    openBuildModal() {
        const player = this.players[this.currentPlayerIdx];
        const cell = this.boardState[player.pos];
        const cost = 50; // Simplified house cost
        
        if (player.money >= cost) {
            if (confirm(`Построить дом на ${cell.name} за ${cost}$?`)) {
                player.money -= cost;
                cell.houses = (cell.houses || 0) + 1;
                this.log(`${player.name} построил дом на ${cell.name}.`);
                playSound('buy');
                this.renderBuildings(cell, player.pos);
                this.updateUI();
                this.saveGame();
            }
        } else {
            alert("Недостаточно денег!");
        }
    }

    renderBuildings(cell, pos) {
        const container = document.getElementById(`builds-${pos}`);
        container.innerHTML = '';
        if (cell.houses) {
            for(let i=0; i<cell.houses; i++) {
                if (i < 4) {
                    const h = document.createElement('div');
                    h.className = 'house-dot';
                    container.appendChild(h);
                } else {
                    const hotel = document.createElement('div');
                    hotel.className = 'hotel-dot';
                    container.appendChild(hotel);
                }
            }
        }
    }

    endTurn() {
        document.getElementById('roll-btn').disabled = false;
        document.getElementById('buy-btn').disabled = true;
        document.getElementById('auction-btn').disabled = true;
        document.getElementById('build-btn').disabled = true;
        document.getElementById('trade-btn').disabled = true;
        document.getElementById('end-turn-btn').disabled = true;
        
        this.currentPlayerIdx = (this.currentPlayerIdx + 1) % this.players.length;
        // Skip bankrupt players
        let loops = 0;
        while (this.players[this.currentPlayerIdx].money < 0 && loops < 4) {
            this.currentPlayerIdx = (this.currentPlayerIdx + 1) % this.players.length;
            loops++;
        }

        const p = this.players[this.currentPlayerIdx];
        document.getElementById('turn-indicator').innerText = `Ход: ${p.name}`;
        document.getElementById('turn-indicator').style.color = p.color;
        this.log(`--- Ход переходит к ${p.name} ---`);
        this.saveGame();
    }

    checkBankruptcy(player) {
        if (player.money < 0) {
            this.handleBankruptcy(player, null);
        }
    }

    handleBankruptcy(player, creditor) {
        this.log(`💀 ${player.name} ОБАНКРОТИЛСЯ!`);
        playSound('error');
        // Return properties to bank
        player.props.forEach(pos => {
            const cell = this.boardState[pos];
            cell.owner = undefined;
            cell.houses = 0;
            const cellEl = document.getElementById(`cell-${pos}`);
            cellEl.style.border = '1px solid #bdc3c7';
            document.getElementById(`builds-${pos}`).innerHTML = '';
        });
        player.props = [];
        player.money = 0;
        // Hide token?
        document.getElementById(`token-${player.id}`).style.opacity = 0.2;
        
        if (this.players.filter(p => p.money > 0).length === 1) {
            alert("ИГРА ОКОНЧЕНА! Победитель определен.");
        }
    }

    updateUI() {
        const statsDiv = document.getElementById('players-stats');
        statsDiv.innerHTML = '';
        this.players.forEach(p => {
            const div = document.createElement('div');
            div.style.borderLeft = `4px solid ${p.color}`;
            div.style.padding = '5px';
            div.style.background = p.id === this.currentPlayerIdx ? '#e8f6f3' : 'transparent';
            div.innerHTML = `<strong>${p.name}</strong>: ${p.money}$ <br> <small>Участков: ${p.props.length}</small>`;
            statsDiv.appendChild(div);
        });

        const logDiv = document.getElementById('game-log');
        logDiv.scrollTop = logDiv.scrollHeight;
        
        // Update buttons state based on current cell
        const cell = this.boardState[this.players[this.currentPlayerIdx].pos];
        if (cell.owner === undefined && ['property','railroad','utility'].includes(cell.type)) {
             if (this.players[this.currentPlayerIdx].money >= cell.price) {
                 document.getElementById('buy-btn').disabled = false;
                 document.getElementById('trade-btn').disabled = false;
             }
        }
        if (cell.owner === this.players[this.currentPlayerIdx].id) {
            document.getElementById('build-btn').disabled = false;
            document.getElementById('trade-btn').disabled = false;
        }
        if (cell.owner !== undefined && cell.owner !== this.players[this.currentPlayerIdx].id) {
             document.getElementById('trade-btn').disabled = false;
        }
    }

    log(msg) {
        const logDiv = document.getElementById('game-log');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    saveGame() {
        const data = {
            players: this.players,
            boardState: this.boardState,
            currentPlayerIdx: this.currentPlayerIdx
        };
        localStorage.setItem('monopoly_save_v2', JSON.stringify(data));
        // Silent save indicator could go here
    }

    loadGame() {
        const saved = localStorage.getItem('monopoly_save_v2');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                this.players = data.players;
                this.boardState = data.boardState;
                this.currentPlayerIdx = data.currentPlayerIdx;
                
                // Restore visuals
                this.players.forEach(p => {
                    this.moveTokenVisual(p.id, p.pos);
                    p.props.forEach(pos => {
                        const cellEl = document.getElementById(`cell-${pos}`);
                        if(cellEl) cellEl.style.border = `3px solid ${p.color}`;
                        if(this.boardState[pos].houses) this.renderBuildings(this.boardState[pos], pos);
                    });
                });
                
                const p = this.players[this.currentPlayerIdx];
                document.getElementById('turn-indicator').innerText = `Ход: ${p.name} (Загружено)`;
                document.getElementById('turn-indicator').style.color = p.color;
                this.log("Игра загружена.");
                this.updateUI();
            } catch (e) {
                console.error("Save file corrupted", e);
            }
        }
    }

    resetGame() {
        if(confirm("Вы уверены? Прогресс будет потерян.")) {
            localStorage.removeItem('monopoly_save_v2');
            location.reload();
        }
    }

    closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }
}

// Start Game
const game = new MonopolyGame();

// Handle resize to reposition tokens
window.addEventListener('resize', () => {
    game.players.forEach(p => game.moveTokenVisual(p.id, p.pos));
});

// Auto-save functionality
let autoSaveInterval;
function startAutoSave() {
    autoSaveInterval = setInterval(() => {
        game.saveGame();
        showSaveNotification();
    }, 30000); // Save every 30 seconds
}

function showSaveNotification() {
    const notification = document.getElementById('save-notification');
    if (notification) {
        notification.classList.add('show');
        setTimeout(() => notification.classList.remove('show'), 2000);
    }
}

// Load saved game on startup
window.addEventListener('load', () => {
    const savedGame = localStorage.getItem('monopolySave');
    if (savedGame) {
        try {
            const saveData = JSON.parse(savedGame);
            if (confirm('Найдена сохраненная игра. Загрузить её?')) {
                game.loadGame(saveData);
            }
    } catch (e) {
        console.error('Ошибка загрузки сохранения:', e);
    }
    }
    startAutoSave();
});

        sounds[type].play().catch(e => console.log('Audio not supported'));
    }
}

    const overlay = document.createElement('div');

    const modal = document.createElement('div');

}

function closeTradeModal() {

}

    document.body.appendChild(overlay);

        <div class="auction-panel">
            <h3>Аукцион!</h3>
